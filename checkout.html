<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/dist/styles.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Document</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-stone-200 flex flex-col h-screen ">
  <header class="flex text-xl bg-gray-300 shadow-lg shadow-gray-400 px-8 py-2 justify-between sticky top-0 z-10">
    <a href="./">
    <img class="h-15" src="./assets/logo.jpg" alt="Logo do trenix">
    </a>
  </header>
  <form class="flex px-5 gap-4 py-10 grow">
    <section id="dados-usuario" class="w-1/3 bg-white rounded-lg py-5">
      <p class="mb-5 text-center font-bold">Seus Dados</p>
      <div class="flex flex-col px-10 py-3">
        <label for="nome" class="font-bold text-sm mb-2">Nome</label>
        <input 
        type="text"
        id="nome"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="Herik Felipe"
        required
            />
      </div>
      <div class="flex flex-col px-10 py-3">
        <label for="email" class="font-bold text-sm mb-2">E-mail:</label>
        <input 
        type="email"
        id="email"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="herik.felipe@gmail.com"
        required
            />
      </div>
      <div class="flex flex-col px-10 py-3">
        <label for="nome" class="font-bold text-sm mb-2">Telefone de contato</label>
        <input 
        type="tel"
        id="nome"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="(47) 99888-3344"
        required
            />
      </div>
    </section>
    <section id="pagamento-entrega" class="w-1/3 bg-white rounded-lg py-5">
      <p class="mb-5 text-center font-bold">Pagamento e Entrega</p>
      <div class="flex flex-col px-10 py-3">
        <label for="numero-cartao" class="font-bold text-sm mb-2">Número do Cartão</label>
        <input 
        type="number"
        id="numero-cartao"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="1111 1111 1111 1111"
        required
            />
      </div>
      <div class="flex">
      <div class="flex flex-col px-10 py-3 w-1/2">
        <label for="cvv" class="font-bold text-sm mb-2">CVV</label>
        <input 
        type="number"
        id="cvv"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="222"
        required
            />
      </div>
       <div class="flex flex-col px-10 py-3 w-1/2">
        <label for="data-expiracao" class="font-bold text-sm mb-2">Data de Validade</label>
        <input 
        type="number"
        id="data-expiracao"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="10/26"
        required
            />
      </div>
      </div>
       <div class="flex flex-col px-10 py-3">
        <label for="cep" class="font-bold text-sm mb-2">CEP</label>
        <input 
        type="number"
        id="cep"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="11122-333"
        required
            />
      </div>
        <div class="flex flex-col px-10 py-3">
        <label for="endereco" class="font-bold text-sm mb-2">Endereço</label>
        <input 
        type="text"
        id="endereco"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="Rua Joao Caetano"
        required
            />
      </div>
         <div class="flex">
      <div class="flex flex-col px-10 py-3 w-1/2">
        <label for="numero" class="font-bold text-sm mb-2">Número</label>
        <input 
        type="number"
        id="numero"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="444"
        required
            />
      </div>
       <div class="flex flex-col px-10 py-3 w-1/2">
        <label for="complemento" class="font-bold text-sm mb-2">Complemento</label>
        <input 
        type="number"
        id="complemento"
        class="bg-white rounded-sm px-2 border-2 border-slate-200 py-1"
        placeholder="Casa/Apartamento"
        required
            />
      </div>
      </div>
    </section>
    <section id="produtos-checkout" class="w-1/3 bg-white rounded-lg py-5 rounded-lg">
      <section id="container-produtos-checkout" class="h-4/5 overflow-y-auto px-2"></section>
      <section id="celula-checkout" class="flex flex-col px-2 h-1/5 justify-around">
        <p id="preco-total" class="bg-slate-200 text-white-300 rounded-sm pl-5">Total: $200</p>
    <button class="bg-slate-900 text-white p-1 hover:bg-slate-800 hover:text-white rounded-lg" type="submit">Finalizar Compra</button>
      </section>
    </section>
  </main>
  <script src="./checkout.js" type="module"></script>
</body>
</html>
